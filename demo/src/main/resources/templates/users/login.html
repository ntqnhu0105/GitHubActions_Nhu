<!DOCTYPE html>
<html lang="vi-VN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Đăng nhập - Thế Giới Di Động</title>
    <style>
        .auth-page { min-height: 65vh; padding: 2.5rem 1rem; background: linear-gradient(180deg, #fff9e6 0%, #fff 100%); }
        .auth-container { max-width: 420px; margin: 0 auto; }
        .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid rgba(255,212,0,0.2); }
        .auth-card__header { background: linear-gradient(90deg, #ffd400 0%, #facc00 100%); color: #333; padding: 1rem 1.5rem; font-weight: 700; font-size: 1.25rem; text-align: center; }
        .auth-card__body { padding: 1.75rem 1.5rem; }
        .auth-form .form-group { margin-bottom: 1.25rem; }
        .auth-form label { display: block; font-weight: 600; color: #333; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .auth-form input[type="text"],
        .auth-form input[type="password"],
        .auth-form input[type="email"],
        .auth-form input[type="tel"] { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: border-color .2s, box-shadow .2s; }
        .auth-form input:focus { outline: none; border-color: #ffd400; box-shadow: 0 0 0 3px rgba(255,212,0,0.25); }
        .auth-form .remember { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; }
        .auth-form .remember input { width: auto; accent-color: #ff9900; }
        .auth-form .remember label { margin: 0; font-weight: 500; font-size: 0.9rem; color: #555; }
        .auth-form .btn-submit { width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(90deg, #ffd400 0%, #ff9900 100%); color: #1a1a1a; transition: all 0.25s ease; }
        .auth-form .btn-submit:hover { background: linear-gradient(90deg, #ff9900 0%, #ffd400 100%); box-shadow: 0 4px 14px rgba(255,153,0,0.4); transform: translateY(-1px); }
        .auth-card__footer { text-align: center; padding-top: 1.25rem; margin-top: 1rem; border-top: 1px solid #f0f0f0; color: #666; font-size: 0.95rem; }
        .auth-card__footer a { color: #d0021c; font-weight: 600; text-decoration: none; }
        .auth-card__footer a:hover { text-decoration: underline; }
        .auth-alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.9rem; }
        .auth-alert--error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .auth-alert--success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-card__header">Đăng nhập</div>
                <div class="auth-card__body">
                    <div th:if="${param.error}" class="auth-alert auth-alert--error">Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.</div>
                    <div th:if="${param.logout}" class="auth-alert auth-alert--success">Bạn đã đăng xuất thành công.</div>

                    <form th:action="@{/login}" method="post" class="auth-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="form-group">
                            <label for="username">Tên đăng nhập</label>
                            <input type="text" id="username" name="username" required autocomplete="username" placeholder="Nhập tên đăng nhập"/>
                        </div>
                        <div class="form-group">
                            <label for="password">Mật khẩu</label>
                            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Nhập mật khẩu"/>
                        </div>
                        <div class="remember">
                            <input type="checkbox" id="remember" name="remember-me"/>
                            <label for="remember">Ghi nhớ đăng nhập</label>
                        </div>
                        <button type="submit" class="btn-submit">Đăng nhập</button>
                    </form>

                    <div class="auth-card__footer">
                        Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
