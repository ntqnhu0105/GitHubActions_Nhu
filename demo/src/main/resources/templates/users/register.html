<!DOCTYPE html>
<html lang="vi-VN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Đăng ký - Thế Giới Di Động</title>
    <style>
        .auth-page { min-height: 65vh; padding: 2.5rem 1rem; background: linear-gradient(180deg, #fff9e6 0%, #fff 100%); }
        .auth-container { max-width: 460px; margin: 0 auto; }
        .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid rgba(255,212,0,0.2); }
        .auth-card__header { background: linear-gradient(90deg, #ffd400 0%, #facc00 100%); color: #333; padding: 1rem 1.5rem; font-weight: 700; font-size: 1.25rem; text-align: center; }
        .auth-card__body { padding: 1.75rem 1.5rem; }
        .auth-form .form-group { margin-bottom: 1.25rem; }
        .auth-form label { display: block; font-weight: 600; color: #333; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .auth-form label .required { color: #d0021c; }
        .auth-form input[type="text"],
        .auth-form input[type="password"],
        .auth-form input[type="email"],
        .auth-form input[type="tel"] { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: border-color .2s, box-shadow .2s; }
        .auth-form input:focus { outline: none; border-color: #ffd400; box-shadow: 0 0 0 3px rgba(255,212,0,0.25); }
        .auth-form input.is-invalid { border-color: #e53e3e; }
        .auth-form .invalid-feedback { color: #c53030; font-size: 0.8rem; margin-top: 0.25rem; }
        .auth-form .btn-submit { width: 100%; padding: 0.875rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(90deg, #ffd400 0%, #ff9900 100%); color: #1a1a1a; transition: all 0.25s ease; }
        .auth-form .btn-submit:hover { background: linear-gradient(90deg, #ff9900 0%, #ffd400 100%); box-shadow: 0 4px 14px rgba(255,153,0,0.4); transform: translateY(-1px); }
        .auth-card__footer { text-align: center; padding-top: 1.25rem; margin-top: 1rem; border-top: 1px solid #f0f0f0; color: #666; font-size: 0.95rem; }
        .auth-card__footer a { color: #d0021c; font-weight: 600; text-decoration: none; }
        .auth-card__footer a:hover { text-decoration: underline; }
        .auth-alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.9rem; }
        .auth-alert--error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .auth-alert--error ul { margin: 0.5rem 0 0 0; padding-left: 1.25rem; }
        .auth-alert--error li { margin: 0.2rem 0; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-card__header">Đăng ký tài khoản</div>
                <div class="auth-card__body">
                    <div th:if="${errors != null and !errors.isEmpty()}" class="auth-alert auth-alert--error">
                        <strong>Vui lòng sửa các lỗi sau:</strong>
                        <ul>
                            <li th:each="err : ${errors}" th:text="${err}">Lỗi</li>
                        </ul>
                    </div>

                    <form th:action="@{/register}" th:object="${user}" method="post" class="auth-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="form-group">
                            <label for="username">Tên đăng nhập <span class="required">*</span></label>
                            <input type="text" id="username" th:field="*{username}" required maxlength="50" autocomplete="username" placeholder="Tên đăng nhập (1–50 ký tự)" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"/>
                            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="invalid-feedback"></p>
                        </div>
                        <div class="form-group">
                            <label for="password">Mật khẩu <span class="required">*</span></label>
                            <input type="password" id="password" th:field="*{password}" required autocomplete="new-password" placeholder="Nhập mật khẩu" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"/>
                            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback"></p>
                        </div>
                        <div class="form-group">
                            <label for="email">Email <span class="required">*</span></label>
                            <input type="email" id="email" th:field="*{email}" required maxlength="50" autocomplete="email" placeholder="vd: email@example.com" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"/>
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback"></p>
                        </div>
                        <div class="form-group">
                            <label for="phone">Số điện thoại</label>
                            <input type="tel" id="phone" th:field="*{phone}" maxlength="10" autocomplete="tel" placeholder="10 chữ số (vd: 0912345678)" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"/>
                            <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="invalid-feedback"></p>
                        </div>
                        <button type="submit" class="btn-submit">Đăng ký</button>
                    </form>

                    <div class="auth-card__footer">
                        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
