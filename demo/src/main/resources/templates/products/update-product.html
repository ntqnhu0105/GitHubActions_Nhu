<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Cập nhật Sản phẩm</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container" style="max-width: 800px;">
        <div class="card border-0 shadow-sm mt-4">
            <div class="card-header bg-warning text-dark fw-bold">
                <i class="bi bi-pencil-square me-2"></i> CẬP NHẬT SẢN PHẨM
            </div>
            <div class="card-body p-4">
                <form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Tên sản phẩm:</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label fw-bold">Giá bán (VNĐ):</label>
                            <input type="number" th:field="*{price}" class="form-control" id="price" required min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label fw-bold">Danh mục:</label>
                            <select th:field="*{category}" class="form-control" id="category">
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}" 
                                        th:text="${category.name}" 
                                        th:selected="${product.category != null && category.id == product.category.id}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="imageFile" class="form-label fw-bold">Hình ảnh sản phẩm:</label>
                        <input type="file" name="imageFile" class="form-control" id="imageFile" accept="image/*" onchange="previewImage(event)">
                        <input type="hidden" th:field="*{image}">
                        <div class="mt-2">
                            <p class="mb-1 small text-muted">Ảnh hiện tại / Preview:</p>
                            <img id="imagePreview" th:src="@{${product.image != null} ? '/images/' + ${product.image} : 'https://placehold.co/150x150?text=No+Image'}" 
                                 alt="Product Image" class="img-thumbnail" style="max-height: 150px;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Mô tả chi tiết:</label>
                        <textarea th:field="*{description}" class="form-control" id="description" rows="4"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/products}" class="btn btn-outline-secondary">Hủy bỏ</a>
                        <button type="submit" class="btn btn-warning fw-bold px-4">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
        </div>
    </div>
    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function(){
                var output = document.getElementById('imagePreview');
                output.src = reader.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</section>
</body>
</html>
