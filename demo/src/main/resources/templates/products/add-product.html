<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm Sản phẩm</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        .add-product-container {
            max-width: 800px;
            margin: 30px auto;
            font-family: 'Arial', sans-serif;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .add-product-header {
            background-color: #feeb50; /* TGDD Yellow */
            padding: 20px;
            text-align: center;
        }
        .add-product-header h2 {
            margin: 0;
            color: #333;
            font-weight: bold;
            text-transform: uppercase;
        }
        .add-product-body {
            background-color: #fff;
            padding: 30px;
        }
        .form-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }
        .form-control {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .form-control:focus {
            border-color: #f7d432;
            outline: none;
            box-shadow: 0 0 0 3px rgba(254, 235, 80, 0.3);
        }
        .btn-tgdd-submit {
            background-color: #d90e16; /* TGDD Red */
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-tgdd-submit:hover {
            background-color: #b30b12;
        }
        .btn-cancel {
            background-color: #f1f1f1;
            color: #333;
            border: 1px solid #ccc;
            padding: 12px 30px;
            border-radius: 4px;
            margin-right: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-cancel:hover {
            background-color: #e2e2e2;
            text-decoration: none;
            color: #333;
        }
        .preview-image {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
            border: 1px solid #ddd;
            padding: 5px;
            border-radius: 4px;
        }
    </style>

    <div class="container">
        <div class="add-product-container">
            <div class="add-product-header">
                <h2><i class="bi bi-plus-circle-fill"></i> Thêm Sản Phẩm Mới</h2>
            </div>
            <div class="add-product-body">
                <form th:action="@{/products/add}" th:object="${product}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên sản phẩm:</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name" required placeholder="Nhập tên sản phẩm (VD: Samsung Galaxy S24 Ultra)">
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Giá bán (VNĐ):</label>
                            <input type="number" th:field="*{price}" class="form-control" id="price" required min="0" placeholder="Nhập giá bán">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Danh mục:</label>
                            <select th:field="*{category}" class="form-control" id="category">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="imageFile" class="form-label">Hình ảnh sản phẩm:</label>
                        <input type="file" name="imageFile" class="form-control" id="imageFile" accept="image/*" onchange="previewImage(event)">
                        <div class="text-muted small mb-2">Chấp nhận ảnh JPG, PNG, GIF.</div>
                        <img id="imagePreview" src="#" alt="Preview" class="preview-image" style="display: none;">
                    </div>

                    <!-- Promotion Section -->
                    <div class="mb-3 p-3 border rounded bg-light">
                        <label class="form-label">Chương trình khuyến mãi:</label>
                        <div class="d-flex gap-3 mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{promotionType}" value="none" id="promoNone" checked onclick="togglePromotion('none')">
                                <label class="form-check-label" for="promoNone">Không</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{promotionType}" value="discount" id="promoDiscount" onclick="togglePromotion('discount')">
                                <label class="form-check-label" for="promoDiscount">Giảm giá</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{promotionType}" value="gift" id="promoGift" onclick="togglePromotion('gift')">
                                <label class="form-check-label" for="promoGift">Quà tặng</label>
                            </div>
                        </div>

                        <div id="promotion-discount-section" style="display: none;">
                            <label for="discount" class="form-label text-danger">Giảm giá (%):</label>
                            <input type="number" th:field="*{discount}" class="form-control" id="discount" min="0" max="100" placeholder="Nhập % giảm giá (VD: 10)">
                        </div>

                        <div id="promotion-gift-section" style="display: none;">
                            <label for="promotionInfo" class="form-label text-success">Thông tin quà tặng:</label>
                            <textarea th:field="*{promotionInfo}" class="form-control" id="promotionInfo" rows="2" placeholder="Nhập chi tiết quà tặng (VD: Tặng tai nghe Bluetooth)"></textarea>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả chi tiết:</label>
                        <textarea th:field="*{description}" class="form-control" id="description" rows="5" placeholder="Nhập mô tả sản phẩm..."></textarea>
                    </div>

                    <div class="text-end">
                        <a th:href="@{/products}" class="btn-cancel">Hủy bỏ</a>
                        <button type="submit" class="btn-tgdd-submit">Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>
    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function(){
                var output = document.getElementById('imagePreview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function togglePromotion(type) {
            document.getElementById('promotion-discount-section').style.display = (type === 'discount') ? 'block' : 'none';
            document.getElementById('promotion-gift-section').style.display = (type === 'gift') ? 'block' : 'none';
        }
        
        // Initialize state on load (in case of validation errors returning to form)
        document.addEventListener("DOMContentLoaded", function() {
            var selected = document.querySelector('input[name="promotionType"]:checked');
            if (selected) {
                togglePromotion(selected.value);
            }
        });
    </script>
</section>
</body>
</html>
